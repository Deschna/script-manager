spring:
  application:
    name: script-manager
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/script_manager}
    username: ${DB_USERNAME:script_manager}
    password: ${DB_PASSWORD:script_manager}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
