services:
  postgres:
    image: postgres:18.3
    container_name: script-manager-postgres
    environment:
      POSTGRES_DB: script_manager
      POSTGRES_USER: script_manager
      POSTGRES_PASSWORD: script_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U script_manager -d script_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
